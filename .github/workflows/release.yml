name: Release

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Upgrade npm for Trusted Publishing
        run: |
          npm i -g npm@^11.5.1
          npm --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Configure Git Identity
        run: |
          git config user.name "isol8-ci"
          git config user.email "isol8-ci[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git"

      - name: Download Coverage Badge
        uses: actions/download-artifact@v4
        with:
          name: coverage-badge
          path: coverage/
          workflow: ci.yml
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: Version Packages and Commit
        id: versioning
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Check if coverage badge exists before staging
          HAS_BADGE=false
          if [ -f coverage/coverage-badge.svg ]; then
            HAS_BADGE=true
            git add coverage/coverage-badge.svg
          fi

          # Check if there are changeset files (indicates a changeset release)
          HAS_CHANGESET=false
          if [ -d .changeset ] && [ -n "$(ls -A .changeset/)" ]; then
            HAS_CHANGESET=true
          fi

          # Run versioning
          bun run version-packages

          VERSION=$(jq -r '.version' packages/core/package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changesets to release."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"

            # Refresh lockfile after version bump so workspace dependency
            # resolution used by `bun pm pack` matches current versions.
            bun install

            # Build commit message based on what changed
            if [ "$HAS_CHANGESET" = true ] && [ "$HAS_BADGE" = true ]; then
              COMMIT_MSG="chore(release): v${VERSION} + coverage badge [skip ci]"
            elif [ "$HAS_CHANGESET" = true ]; then
              COMMIT_MSG="chore(release): v${VERSION} [skip ci]"
            elif [ "$HAS_BADGE" = true ]; then
              COMMIT_MSG="chore(release): v${VERSION} (coverage badge only) [skip ci]"
            else
              COMMIT_MSG="chore(release): v${VERSION} [skip ci]"
            fi

            echo "Commit message: $COMMIT_MSG"

            git add -A
            # Skip CI for this release-generated commit to avoid a workflow loop.
            git commit -m "$COMMIT_MSG"
            git push origin HEAD:main
          fi

      - name: Publish Packages
        run: bun run release:publish

      - name: Create and Push Tag
        id: tag
        run: |
          TAG="v${{ steps.versioning.outputs.version }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
            echo "tag_created=false" >> "$GITHUB_OUTPUT"
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "tag_created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.tag.outputs.tag_created == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            apps/server/dist/isol8-server-linux-x64
            apps/server/dist/isol8-server-linux-arm64
            apps/server/dist/isol8-server-darwin-x64
            apps/server/dist/isol8-server-darwin-arm64
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
