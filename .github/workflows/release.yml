name: Release

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Configure Git Identity
        run: |
          git config user.name "isol8-ci"
          git config user.email "isol8-ci[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git"

      - name: Version Packages and Commit
        id: versioning
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          bun run version-packages

          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changesets to release."
            exit 0
          fi

          VERSION=$(jq -r '.version' packages/core/package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

          git add -A
          # Skip CI for this release-generated commit to avoid a workflow loop.
          git commit -m "chore(release): v${VERSION} [skip ci]"
          git push origin HEAD:main

      - name: Publish Packages
        if: steps.versioning.outputs.has_changes == 'true'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun run release:publish

      - name: Create and Push Tag
        if: steps.versioning.outputs.has_changes == 'true'
        run: |
          TAG="v${{ steps.versioning.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub Release
        if: steps.versioning.outputs.has_changes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.versioning.outputs.version }}
          generate_release_notes: true
          files: |
            apps/server/dist/isol8-server-linux-x64
            apps/server/dist/isol8-server-linux-arm64
            apps/server/dist/isol8-server-darwin-x64
            apps/server/dist/isol8-server-darwin-arm64
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
