name: Release

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: bun run release:publish
          commit: "chore: version packages"
          title: "chore: version packages"
          commitMode: github-api
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Resolve Published Version
        if: steps.changesets.outputs.published == 'true'
        id: version
        run: echo "version=$(jq -r '.version' packages/core/package.json)" >> "$GITHUB_OUTPUT"

      - name: Create Tag
        if: steps.changesets.outputs.published == 'true'
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: steps.changesets.outputs.published == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            apps/server/dist/isol8-server-linux-x64
            apps/server/dist/isol8-server-linux-arm64
            apps/server/dist/isol8-server-darwin-x64
            apps/server/dist/isol8-server-darwin-arm64
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
